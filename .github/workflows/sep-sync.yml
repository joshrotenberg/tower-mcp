name: Sync SEPs

on:
  schedule:
    # Run weekly on Mondays at 9am UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual trigger

permissions:
  issues: write
  contents: read

jobs:
  sync-seps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Sync SEP tracking issues
        id: sync
        uses: actions/github-script@v9
        with:
          script: |
            const script = require('./.github/scripts/sync-seps.js');
            await script({github, context, core});

      - name: Add workflow summary
        run: |
          echo "## SEP Sync Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Upstream SEPs | ${{ steps.sync.outputs.total_upstream }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Created | ${{ steps.sync.outputs.created }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Updated | ${{ steps.sync.outputs.updated }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Closed | ${{ steps.sync.outputs.closed }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Skipped | ${{ steps.sync.outputs.skipped }} |" >> $GITHUB_STEP_SUMMARY

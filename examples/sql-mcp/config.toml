# sql-mcp example configuration

[server]
name = "sql-mcp"
version = "0.1.0"

[safety]
read_only = true
row_limit = 1000
query_timeout_seconds = 30

# SQLite database (for testing)
[[databases]]
name = "local"
url = "sqlite:///tmp/sql-mcp-test.db"
read_only = false
row_limit = 500
pool_size = 1


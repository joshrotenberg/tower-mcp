services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: sqlmcp
      POSTGRES_PASSWORD: sqlmcp
      POSTGRES_DB: testdb
    ports:
      - "5432:5432"
    volumes:
      - ./seed/postgres.sql:/docker-entrypoint-initdb.d/seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sqlmcp -d testdb"]
      interval: 2s
      timeout: 5s
      retries: 5

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: sqlmcp
      MYSQL_PASSWORD: sqlmcp
      MYSQL_DATABASE: testdb
    ports:
      - "3306:3306"
    volumes:
      - ./seed/mysql.sql:/docker-entrypoint-initdb.d/seed.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-usqlmcp", "-psqlmcp"]
      interval: 2s
      timeout: 5s
      retries: 5

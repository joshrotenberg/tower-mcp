[workspace]
members = [
    "crates/tower-mcp",
    "crates/tower-mcp-types",
    "examples/conformance-server",
    "examples/markdownlint-mcp",
    "examples/codegen-mcp",
    "examples/notes-mcp",
]

[workspace.package]
version = "0.7.0"
edition = "2024"
rust-version = "1.90"

[workspace.dependencies]
tower-resilience = { version = "0.7", default-features = false, features = ["bulkhead", "ratelimiter"] }
